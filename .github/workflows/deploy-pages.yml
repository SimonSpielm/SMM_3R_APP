name: Deploy marimo apps to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export SMM app
        run: |
          rm -rf dist
          marimo export html-wasm smm_single_branch_marimo.py \
            -o dist/smm --mode run

      - name: Export Manipulability app
        run: |
          marimo export html-wasm manipulability_marimo.py \
            -o dist/manipulability --mode run

      - name: Create landing page
        run: |
          touch dist/.nojekyll
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
            <title>3R Robot – Interactive Apps</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                font-family: 'Segoe UI', system-ui, sans-serif;
                background: #0f172a;
                color: #e2e8f0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2rem;
                padding: 2rem;
              }
              h1 { font-size: 1.8rem; font-weight: 700; color: #f8fafc; }
              p  { color: #94a3b8; font-size: 0.95rem; max-width: 480px; text-align: center; }
              .cards {
                display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
              }
              .card {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 12px;
                padding: 1.8rem 2rem;
                width: 260px;
                text-align: center;
                text-decoration: none;
                color: inherit;
                transition: border-color .2s, transform .2s;
              }
              .card:hover { border-color: #60a5fa; transform: translateY(-3px); }
              .card .icon { font-size: 2.4rem; margin-bottom: .8rem; }
              .card h2 { font-size: 1.05rem; color: #f1f5f9; margin-bottom: .4rem; }
              .card p  { font-size: 0.82rem; color: #64748b; }
            </style>
          </head>
          <body>
            <h1>3R Robot – Interactive Apps</h1>
            <p>Select an application to open it in the browser. Both apps run entirely client-side via WebAssembly.</p>
            <div class="cards">
              <a class="card" href="smm/">
                <div class="icon">🔄</div>
                <h2>Self-Motion Manifold</h2>
                <p>Explore the closed self-motion manifold of the planar 3R manipulator.</p>
              </a>
              <a class="card" href="manipulability/">
                <div class="icon">📐</div>
                <h2>Manipulability</h2>
                <p>Visualise weak and strong translational manipulability ellipsoids along the SMM.</p>
              </a>
            </div>
          </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
